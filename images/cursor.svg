<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow arrow -->
  <polygon points="4,2 4,28 11,21 15.5,32 20,30 15.5,19 26,19"
    fill="#0d47ff" opacity="0.4" filter="url(#glow2)"/>

  <!-- Main arrow body -->
  <polygon points="4,2 4,28 11,21 15.5,32 20,30 15.5,19 26,19"
    fill="#1565ff" stroke="#4fc3ff" stroke-width="0.8" filter="url(#glow)"/>

  <!-- Inner highlight -->
  <polygon points="6,5 6,22 10,18 14,27 17,26 13,17 21,17"
    fill="#2979ff" opacity="0.6"/>

  <!-- Top edge highlight -->
  <line x1="4" y1="2" x2="26" y2="19" stroke="#82cfff" stroke-width="0.6" opacity="0.8"/>

  <!-- Circuit line accent -->
  <line x1="11" y1="21" x2="11" y2="26" stroke="#4fc3ff" stroke-width="0.8" opacity="0.7" filter="url(#glow)"/>
  <line x1="11" y1="26" x2="15" y2="26" stroke="#4fc3ff" stroke-width="0.8" opacity="0.7"/>

  <!-- Orange dot accent -->
  <circle cx="15" cy="32" r="2.2" fill="#ff8f00" filter="url(#glow2)" opacity="0.95"/>
  <circle cx="15" cy="32" r="1.2" fill="#ffcc02"/>

  <!-- Small blue dot on elbow -->
  <circle cx="11" cy="21" r="1.2" fill="#82cfff" filter="url(#glow)"/>
</svg>
